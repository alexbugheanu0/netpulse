# NetPulse Device Inventory
# Replace ip values with real lab IPs before use.
# Credentials are NOT stored here — use .env file.

devices:
  - name: sw-core-01
    hostname: sw-core-01
    ip: 192.168.100.11
    platform: cisco_ios
    role: core
    ssh_enabled: true
    snmp_enabled: false

  - name: sw-dist-01
    hostname: sw-dist-01
    ip: 192.168.100.12
    platform: cisco_ios
    role: distribution
    ssh_enabled: true
    snmp_enabled: false

  - name: sw-acc-01
    hostname: sw-acc-01
    ip: 192.168.100.13
    platform: cisco_ios
    role: access
    ssh_enabled: true
    snmp_enabled: false

  - name: sw-acc-02
    hostname: sw-acc-02
    ip: 192.168.100.14
    platform: cisco_ios
    role: access
    ssh_enabled: true
    snmp_enabled: false
